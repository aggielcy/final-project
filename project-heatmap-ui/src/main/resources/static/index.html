<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stock Heatmap</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

  
</head>
<body>
  <h1>Stock Heatmap</h1>
  <p id="subtitle">S&P 500 · Market Cap · Performance D, %</p>


  <div id="heatmap-container">
   
    <div id="heatmap"></div>
  </div>

  <div id="legend-bar">
  <span class="legend-item" style="background:#e70909">-3%</span>
  <span class="legend-item" style="background:#ab1717">-2%</span>
  <span class="legend-item" style="background:#6f2424">-1%</span>
  <span class="legend-item" style="background:#333232">0%</span>
  <span class="legend-item" style="background:#236423">+1%</span>
  <span class="legend-item" style="background:#149513">+2%</span>
  <span class="legend-item" style="background:#04c704">+3%</span>
</div>


  <div id="hover-tooltip"></div>
  <script src="js/app.js"></script>
</body>
</html>
